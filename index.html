<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Tools Directory</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
margin:0;
background:#f5f5f7;
color:#1d1d1f;
}

header{
text-align:center;
padding:80px 20px;
}

header h1{
font-size:48px;
font-weight:600;
margin-bottom:10px;
}

header p{
font-size:20px;
color:#6e6e73;
}

.container{
max-width:1000px;
margin:auto;
padding:40px 20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
padding:25px;
border-radius:16px;
box-shadow:0 10px 20px rgba(0,0,0,0.05);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 15px 30px rgba(0,0,0,0.08);
}

.card h3{
margin-top:0;
}

.card a{
text-decoration:none;
color:#0071e3;
font-weight:500;
}

footer{
text-align:center;
padding:40px;
color:#6e6e73;
}

</style>

</head>

<body>

<header>
<h1>AI Tools Directory</h1>
<p>Discover the best AI tools</p>
</header>

<div class="container">

<div class="card">
<h3>ChatGPT</h3>
<p>Powerful AI chatbot by OpenAI</p>
<a href="https://chat.openai.com">Visit →</a>
</div>

<div class="card">
<h3>Claude</h3>
<p>Advanced AI assistant</p>
<a href="https://claude.ai">Visit →</a>
</div>

<div class="card">
<h3>Midjourney</h3>
<p>Create AI images from text</p>
<a href="https://midjourney.com">Visit →</a>
</div>

<div class="card">
<h3>Perplexity</h3>
<p>AI powered search engine</p>
<a href="https://perplexity.ai">Visit →</a>
</div>

</div>

<footer>
<p>© 2026 AI Tools Directory</p>
</footer>

</body>
</html>
