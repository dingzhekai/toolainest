/* NAV */
.nav{

gap:24px;

.logo{

.nav-badge{

}

.nav-links{

.nav-links a:hover{

}

.nav-actions{

}

font-weight:600;
padding:11px 15px;
text-decoration:none;

}

.submit-link:hover{

box-shadow:0 16px 32px rgba(17,24,39,0.2);

.lang-switch{
align-items:center;
appearance:none;
background:rgba(232,235,241,0.78);
border:1px solid rgba(210,214,222,0.78);
border-radius:999px;
box-sizing:border-box;
cursor:pointer;
display:flex;
gap:0;
font-size:14px;
height:40px;
line-height:1;
overflow:hidden;
padding:4px;
position:relative;
transition:box-shadow 0.2s ease,background 0.2s ease;
width:124px;
}

.lang-switch:hover{
box-shadow:0 10px 24px rgba(24,39,75,0.09);
}

.lang-switch:focus-visible{
outline:2px solid rgba(0,113,227,0.42);
outline-offset:3px;
}

.lang-switch-knob{
background:rgba(255,255,255,0.96);
border-radius:999px;
box-shadow:0 6px 16px rgba(24,39,75,0.14);
display:block;
flex:none;
height:30px;
left:4px;
position:absolute;
top:4px;
transition:transform 0.32s cubic-bezier(0.22,1,0.36,1);
width:56px;
z-index:0;
}

.lang-switch.zh .lang-switch-knob{
transform:translateX(60px);
}

.lang-switch .lang-en,
.lang-switch .lang-zh{
align-items:center;
color:#5f6673;
display:flex;
flex:1;
font-weight:600;
justify-content:center;
position:relative;
transition:color 0.22s ease;
z-index:1;
}

.lang-switch.en .lang-en,
.lang-switch.zh .lang-zh{

}

border-radius:25px;

}

.search-box input:focus{

border-color:#0071e3;
box-shadow:0 18px 42px rgba(0,113,227,0.16);
}

/* LAYOUT */
.content-layout{
display:grid;
grid-template-columns:220px minmax(0,1fr);
gap:24px;
max-width:1200px;
margin:auto;
padding:20px;
}

.sidebar{
position:sticky;
top:20px;
align-self:start;
max-height:calc(100vh - 40px);
overflow-y:auto;
background:rgba(255,255,255,0.72);
backdrop-filter:blur(18px);
border-radius:18px;
border:1px solid rgba(255,255,255,0.78);
box-shadow:0 18px 44px rgba(24,39,75,0.08);
padding:16px;
}

.sidebar-title{
font-weight:600;
margin:4px 0 12px;
color:#252b36;
}

/* FILTER */
.filters{
display:flex;
flex-direction:column;
gap:8px;
}

.filters button{
width:100%;
padding:11px 14px;
border:1px solid transparent;
border-radius:10px;
background:rgba(242,244,248,0.86);
color:#424a57;
cursor:pointer;
transition:0.2s;
text-align:left;
}

.filters button:hover{
background:white;
border-color:rgba(0,113,227,0.18);
box-shadow:0 8px 18px rgba(24,39,75,0.07);
}

.filters button.active{
background:#111827;
color:white;
box-shadow:0 12px 26px rgba(17,24,39,0.18);
}

/* SECTION */
.section{
min-width:0;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.86);
border:1px solid rgba(255,255,255,0.82);
border-top:3px solid #0071e3;
padding:25px;
border-radius:18px;
box-shadow:0 18px 44px rgba(24,39,75,0.08);
transition:0.3s;
position:relative;
overflow:hidden;
}

.card:hover{
transform:translateY(-6px);
background:white;
box-shadow:0 24px 58px rgba(24,39,75,0.13);
}

.card[data-category="Chat"]{
border-top-color:#0071e3;
}

.card[data-category="Image"]{

}

.card[data-category="Video"]{

}

.card[data-category="Writing"]{

}

.card[data-category="Coding"]{

}

.card h3{
font-family:var(--font-serif);
margin:3px 0 8px;
font-size:20px;
font-weight:500;
color:#161a22;
}

.card p{
color:#69707d;
font-size:14px;
min-height:40px;
line-height:1.55;
}

.card a{
display:inline-block;
margin-top:10px;
margin-right:10px;
color:#0071e3;
text-decoration:none;
font-size:14px;
font-weight:500;
}

.card a:hover{

}

/* FOOTER */
footer{

padding:40px;
color:#707784;
}

@media (max-width:760px){

flex-direction:column;

}

.nav-left,
.nav-actions{

}

.nav-links{

overflow-x:auto;
padding-bottom:2px;
width:100%;
}

.nav-links a{
background:rgba(255,255,255,0.58);
}

.submit-link{
padding:11px 14px;
}

.content-layout{
grid-template-columns:1fr;
padding:12px;
}

.sidebar{
position:relative;
top:auto;
max-height:180px;
border-radius:14px;
}

</style>

</head>

<body>

<!-- NAV -->
<div class="nav">
<div class="nav-left">

</div>

<script>
function switchLang(){
let nextLang=currentLang==="en" ? "zh" : "en"
let nextPath=nextLang==="zh" ? "/zh" : "/"
let switchButton=document.getElementById("lang_switch")
switchButton.className="lang-switch " + nextLang
switchButton.disabled=true
setTimeout(()=>{
location.href=nextPath
},180)
}
let currentLang = location.pathname.startsWith("/zh") ? "zh" : "en"

const text = {
en:{
title:"Explore the Future of AI",
subtitle:"100+ AI tools for productivity, creativity and innovation",
search:"Search AI tools...",
categories:"Categories",
nav:{
browse:"Browse",
categories:"Categories",
about:"About",
contact:"Contact",
submit:"Submit tool",
countSuffix:" tools"
},
categoryLabels:{
All:"All",
Chat:"Chat",
Image:"Image",
Video:"Video",
Writing:"Writing",
Coding:"Coding"
},
visit:"Visit",
details:"Details",
footer:"© 2026 AI Tools Directory"
},
zh:{
title:"探索AI的未来",
subtitle:"100+ AI工具一站式导航",
search:"搜索AI工具...",
categories:"类别",
nav:{
browse:"浏览",
categories:"分类",
about:"关于",
contact:"联系",
submit:"提交工具",
countSuffix:" 个工具"
},
categoryLabels:{
All:"全部",
Chat:"聊天",
Image:"图像",
Video:"视频",
Writing:"写作",
Coding:"编程"
},
visit:"访问",
details:"详情",
footer:"© 2026 AI工具导航"
}
}
function updateText(){
let t = text[currentLang]

document.getElementById("title").innerText = t.title
document.getElementById("subtitle").innerText = t.subtitle
document.getElementById("search").placeholder = t.search
document.getElementById("category_title").innerText = t.categories
document.getElementById("lang_switch").className = "lang-switch " + currentLang
document.getElementById("nav_browse").innerText = t.nav.browse
document.getElementById("nav_categories").innerText = t.nav.categories
document.getElementById("nav_about").innerText = t.nav.about
document.getElementById("nav_contact").innerText = t.nav.contact
document.getElementById("nav_submit").innerText = t.nav.submit
document.getElementById("nav_count").innerText = allTools.length + t.nav.countSuffix

document.getElementById("footer").innerText = t.footer
}

let allTools=[]
let currentCategory="All"

// 加载数据
fetch("data/tools.json")
.then(res=>res.json())
.then(tools=>{
allTools=tools
updateText()
renderCategoryButtons()
displayTools(tools)
})

function getCategories(){
let categories=allTools.map(tool=>tool.category)
return ["All", ...new Set(categories)]
}

function renderCategoryButtons(){
let container=document.getElementById("category_filters")
container.innerHTML=""

getCategories().forEach(category=>{
let button=document.createElement("button")
button.type="button"
button.dataset.category=category
button.innerText=text[currentLang].categoryLabels[category] || category
button.classList.toggle("active", category===currentCategory)
button.onclick=()=>filterTools(category)
container.appendChild(button)
})
}

// 渲染工具
function displayTools(tools){
let container=document.getElementById("tools")
container.innerHTML=""

tools.forEach(tool=>{
let card=`

<div class="card" data-category="${tool.category}">

<h3>${tool.name}</h3>

<p>${tool.description}</p>

<div>
<a href="tool.html?name=${encodeURIComponent(tool.name)}">${text[currentLang].details}</a>
<a href="${tool.url}" target="_blank">${text[currentLang].visit}</a>
</div>

</div>

`
container.innerHTML+=card
})
}

// 分类
function filterTools(category){
currentCategory=category
document.querySelectorAll(".filters button").forEach(button=>{
button.classList.toggle("active", button.dataset.category===category)
})
applyFilters()
}

// 搜索
function searchTools(){
applyFilters()
}

function applyFilters(){
let keyword=document.getElementById("search").value.toLowerCase()

let filtered=allTools.filter(tool =>
 (currentCategory==="All" || tool.category===currentCategory) &&
 (
 tool.name.toLowerCase().includes(keyword) ||
 tool.description.toLowerCase().includes(keyword) ||
 tool.category.toLowerCase().includes(keyword)
 )
)

displayTools(filtered)
}

</script>

</body>
