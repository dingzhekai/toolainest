<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title id="title">AI Tool</title>

<meta name="description" id="metaDesc" content="AI tool details">

<style>
body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:
linear-gradient(135deg,rgba(10,132,255,0.12),rgba(48,209,88,0.08) 38%,rgba(255,159,10,0.08) 100%),
linear-gradient(180deg,#fbfbfd 0%,#eef1f6 100%);
color:#1d1d1f;
min-height:100vh;
margin:0;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
background:rgba(255,255,255,0.86);
border:1px solid rgba(255,255,255,0.82);
padding:40px;
border-radius:20px;
box-shadow:0 24px 58px rgba(24,39,75,0.12);
backdrop-filter:blur(18px);
}

h1{
margin-bottom:10px;
font-size:42px;
letter-spacing:0;
}

.tag{
display:inline-block;
padding:7px 14px;
background:#111827;
color:white;
border-radius:999px;
font-size:12px;
font-weight:600;
margin-bottom:15px;
}

.section{
margin-top:20px;
line-height:1.7;
color:#5f6673;
}

a{
color:#0071e3;
text-decoration:none;
font-weight:500;
}

a:hover{
color:#004f9f;
}

@media (max-width:760px){
body{
padding:18px;
}

.container{
padding:28px;
border-radius:18px;
}

h1{
font-size:34px;
}
}

</style>

</head>

<body>

<div class="container" id="tool">
Loading...
</div>

<script>

const params = new URLSearchParams(window.location.search)
const name = params.get("name")

fetch("data/tools.json")
.then(res=>res.json())
.then(tools=>{

let tool = tools.find(t => t.name === name)

if(!tool){
document.getElementById("tool").innerHTML="Tool not found"
return
}

// SEO 动态更新
document.title = tool.name + " - AI Tool"
document.getElementById("metaDesc").setAttribute("content", tool.description)

// 页面内容
document.getElementById("tool").innerHTML = `

<h1>${tool.name}</h1>

<div class="tag">${tool.category}</div>

<div class="section">
${tool.description}
</div>

<div class="section">
${tool.longDescription || "This AI tool helps improve productivity, automate tasks, and enhance creativity. It is widely used in modern workflows."}
</div>

<br>

<a href="${tool.url}" target="_blank">
Visit Official Website →
</a>

`

})

</script>

</body>

</html>
